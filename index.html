<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Builder — Create Your Resume</title>
  <meta name="description" content="Build an ATS-friendly resume in minutes. Free to start." />
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">Resume</a>
      <nav class="nav">
        <a href="http://localhost:5173/login">Log in</a>
        <a href="http://localhost:5173/register" class="btn btn-primary">Sign up free</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container hero-inner">
        <h1 class="hero-title">Build a resume that gets noticed</h1>
        <p class="hero-subtitle">Create an ATS-friendly resume in minutes. Free to start — no card required.</p>
        <div class="hero-cta">
          <a href="http://localhost:5173/register" class="btn btn-primary btn-lg">Create free resume</a>
          <a href="http://localhost:5173/login" class="btn btn-ghost">I already have an account</a>
        </div>
      </div>
    </section>

    <section class="features">
      <div class="container">
        <ul class="features-list">
          <li>Professional templates</li>
          <li>Edit anytime, save to your account</li>
          <li>Ready for job applications</li>
        </ul>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; <span id="year"></span> Resume Builder</p>
    </div>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
